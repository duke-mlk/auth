name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Build
        env:
          SOURCE_URL: ${{ vars.SOURCE_URL }}
          TEMPLATE_CLIENT_ID: ${{ secrets.TEMPLATE_CLIENT_ID }}
          SOURCE_CLIENT_ID: ${{ secrets.SOURCE_CLIENT_ID }}
        run: |
          curl -sL "$SOURCE_URL" \
            | sed "s/$TEMPLATE_CLIENT_ID/$SOURCE_CLIENT_ID/" \
            > index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deploy
        uses: actions/deploy-pages@v4
